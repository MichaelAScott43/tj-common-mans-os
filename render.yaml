services:
  - type: web
    name: tj-common-mans-os-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: steady
      - key: OPENAI_API_KEY
        sync: false

  - type: static
    name: tj-common-mans-os-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: EXPO_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: tj-common-mans-os-api
          envVarKey: RENDER_EXTERNAL_URL
